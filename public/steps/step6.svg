<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0a0a0a"/>
  <!-- Browser chrome -->
  <rect x="40" y="30" width="720" height="440" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
